# Runtime data is stored outside the project by default:
# Windows: %ProgramData%\PrintingPlatform
# Linux:   $XDG_DATA_HOME/printing-platform or ~/.local/share/printing-platform
# Override with PRINTING_PLATFORM_DATA_DIR.
initial_admin_student_id = "admin"
min_password_length = 8
default_daily_limit = 10
session_days = 30
queue_poll_seconds = 5
cleanup_interval_hours = 6
file_retention_days = 365
temp_upload_retention_hours = 24

[server]
bind = "0.0.0.0:80"

[limits]
max_upload_bytes = 52428800
max_import_bytes = 2097152
max_files_per_request = 10
max_pages_per_file = 500
max_temp_bytes_per_user = 209715200
conversion_concurrency = 1

[printer]
name = "HP LaserJet Professional P1106"
simulate = false
command_timeout_seconds = 60
job_discovery_seconds = 20
pdf_printer_path = ""

# PDF uploads need no converter. For Office/image/text uploads, configure a
# program with separate arguments. Linux example:
# office_program = "libreoffice"
# office_args = ["--headless", "--convert-to", "pdf", "--outdir", "{output_dir}", "{input}"]
[converter]
office_program = ""
office_args = []
command_timeout_seconds = 180
