# SQLite database URL. The parent directory is created during startup.
database_url = "sqlite://data/printing_platform.db"
data_dir = "data"
initial_admin_student_id = "admin"
session_days = 365
queue_poll_seconds = 5
cleanup_interval_hours = 6
file_retention_days = 365
temp_upload_retention_hours = 24

[server]
bind = "127.0.0.1:8080"

[printer]
name = "HP LaserJet Professional P1106"
simulate = false
command_timeout_seconds = 60
backend_script = "scripts/printer-backend.ps1"
job_discovery_seconds = 20
# 留空时自动查找系统安装的 SumatraPDF、Adobe Reader，或本机自备的 tools/SumatraPDF.exe。
pdf_printer_path = ""

[converter]
# Program and argument list for non-PDF conversion. Keeping each argument as a
# separate TOML item prevents cmd.exe from corrupting paths that contain spaces.
# Placeholders: {input}, {output}
office_program = "powershell"
office_args = ["-NoProfile", "-ExecutionPolicy", "Bypass", "-File", "scripts/convert-office.ps1", "-InputPath", "{input}", "-OutputPath", "{output}"]
command_timeout_seconds = 180
